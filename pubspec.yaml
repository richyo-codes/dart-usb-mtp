name: usb_mtp_client
description: Flutter plugin for USB MTP device discovery and file access.
version: 0.1.0
publish_to: "none"

environment:
  sdk: ^3.9.2
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.local.usb_mtp_client
        pluginClass: UsbSyncPlugin
      linux:
        pluginClass: UsbSyncPlugin
      windows:
        pluginClass: UsbSyncCApi
