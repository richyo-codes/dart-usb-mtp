name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Analyze plugin
        run: flutter analyze

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Run example widget tests
        working-directory: example
        run: flutter test
