name: Build Example Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      BUILD_MODE: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compute artifact version
        run: echo "ARTIFACT_VERSION=$(./tools/artifact_version.sh)" >> "$GITHUB_ENV"

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Linux example bundle
        working-directory: example
        run: flutter build linux --release

      - name: Package Linux artifact
        run: ./tools/package_linux_example.sh "$ARTIFACT_VERSION"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb_sync_example-linux-x64-${{ env.ARTIFACT_VERSION }}
          path: dist/usb_sync_example-linux-x64-${{ env.ARTIFACT_VERSION }}.tar.gz
          if-no-files-found: error
